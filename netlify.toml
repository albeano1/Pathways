[build]
  command = "npm run build:netlify"
  publish = "client/dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "20"
  NODE_OPTIONS = "--max-old-space-size=4096"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["better-sqlite3"]
  included_files = ["data/graph.db", "netlify/functions/data/graph.db"]

[functions.api]
  included_files = ["data/graph.db", "netlify/functions/data/graph.db", "server/dist/**"]
  timeout = 26
  memory = 1536

[functions.api.environment]
  NODE_OPTIONS = "--max-old-space-size=768"

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/api/*"
  [headers.values]
    Cache-Control = "no-store"

[[headers]]
  for = "/daily-puzzle.json"
  [headers.values]
    Cache-Control = "public, max-age=60, stale-while-revalidate=300"

[[headers]]
  for = "/daily/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"

[[headers]]
  for = "/boot.js"
  [headers.values]
    Cache-Control = "public, max-age=3600, stale-while-revalidate=86400"
